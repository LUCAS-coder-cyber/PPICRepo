name: CI Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Build Docker image
        run: |
          docker build -t vowel-frequency-analyser:latest .

      - name: Run Docker container
        run: |
          docker run --rm \
            -e GITHUB_USER="${{ github.actor }}" \
            vowel-frequency-analyser:latest 