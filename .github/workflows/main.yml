name: Collaborative Workflow

on:
  push:
    branches:
      - main

jobs:
  update_html_and_readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Update index.html if YOU made the commit
      - name: Update team leader
        if: github.actor == 'LUCAS-coder-cyber'
        run: |
          sed -i '/<\/body>/i <p>Updated by Team Leader on '"$(date)"'</p>' index.html

      # Update index.html if someone else made the commit
      - name: Update other
        if: github.actor != 'LUCAS-coder-cyber'
        run: |
          sed -i '/<\/body>/i <p>Updated by Other User on '"$(date)"'</p>' index.html

      # Update README.md log
      - name: Update README
        run: |
          echo "- Update made by ${{ github.actor }} on $(date)" >> README.md

      # Step 4: Commit Changes to index.html and README
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          git commit -m "Workflow: Updated HTML and README for ${{ github.actor }}" || echo "No changes to commit"

          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}