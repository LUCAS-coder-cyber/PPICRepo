name: 'Vowel Frequency Analyser'
description: 'A GitHub Action to analyze the frequency of vowels in a given text.'


inputs:
  file:
    description: 'The file containing the text to analyze.'
    required: true

runs:
  using: 'docker'
  image: ghcr.io/georges034302/vowel-frequency-analyser:latest
  entrypoint: ['/bin/bash', '/github/scripts/entrypoint.sh']
  env:
    FILE: ${{ inputs.file }}
